<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — PUFFY</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>
    
    <main class="container">
        <div class="auth-container fade-in-up">
            <header class="auth-header">
                <h1 class="logo" aria-label="PUFFY">
                    <span class="logo-letter">P</span>
                    <span class="logo-letter">U</span>
                    <span class="logo-letter">F</span>
                    <span class="logo-letter">F</span>
                    <span class="logo-letter">Y</span>
                </h1>
                <p class="tagline">Добро пожаловать обратно!</p>
            </header>
            
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="username">Имя пользователя или Email</label>
                    <input type="text" id="username" name="username" required 
                           placeholder="Введите имя пользователя или email" 
                           autocomplete="username">
                    <div class="form-error" id="username-error"></div>
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" required 
                               placeholder="Введите пароль" 
                               autocomplete="current-password">
                        <button type="button" class="password-toggle" id="password-toggle">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8v11c0 2.21-1.79 4-4 4H5c-2.21 0-4-1.79-4-4V5z"/>
                                <path d="M12 1v6m0 4v6"/>
                            </svg>
                        </button>
                    </div>
                    <div class="form-error" id="password-error"></div>
                </div>
                
                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember" name="remember">
                        <span class="checkbox-custom"></span>
                        Запомнить меня
                    </label>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="login-btn">
                        <span class="btn-text">Войти</span>
                        <div class="loading-spinner" id="login-loading" style="display: none;"></div>
                    </button>
                    <button type="button" class="btn-secondary" id="forgot-btn">
                        Забыли пароль?
                    </button>
                </div>
                
                <div class="auth-links">
                    <p>Нет аккаунта? <a href="register.html" class="auth-link">Зарегистрируйтесь</a></p>
                </div>
            </form>
        </div>
    </main>
    
    <div class="notification" id="notification" style="display: none;">
        <div class="notification-content">
            <div class="notification-icon" id="notification-icon"></div>
            <div class="notification-message" id="notification-message"></div>
            <button class="notification-close" id="notification-close">×</button>
        </div>
    </div>

    <script src="auth-system.js"></script>
    <script>
        // Инициализация системы авторизации
        const authSystem = new AuthSystem();
        
        // Проверяем, не авторизован ли уже пользователь
        if (authSystem.isAuthenticated()) {
            window.location.href = 'index.html';
        }
        
        // Обработчики формы
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('login-form');
            const loginBtn = document.getElementById('login-btn');
            const loadingSpinner = document.getElementById('login-loading');
            const forgotBtn = document.getElementById('forgot-btn');
            
            // Переключатель видимости пароля
            setupPasswordToggle();
            
            // Отправка формы
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // Показываем загрузку
                loginBtn.disabled = true;
                loadingSpinner.style.display = 'inline-block';
                document.querySelector('.btn-text').style.display = 'none';
                
                // Собираем данные формы
                const credentials = {
                    username: document.getElementById('username').value.trim(),
                    password: document.getElementById('password').value,
                    remember: document.getElementById('remember').checked
                };
                
                // Пытаемся войти
                const result = await authSystem.login(credentials);
                
                if (result.success) {
                    showNotification('success', result.message);
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showNotification('error', result.error);
                    // Показываем конкретные ошибки
                    showFieldErrors(result.error);
                }
                
                // Скрываем загрузку
                loginBtn.disabled = false;
                loadingSpinner.style.display = 'none';
                document.querySelector('.btn-text').style.display = 'inline';
            });
            
            // Кнопка "Забыли пароль"
            forgotBtn.addEventListener('click', function() {
                showNotification('info', 'Функция восстановления пароля будет доступна скоро');
            });
        });
        
        // Настройка переключателя пароля
        function setupPasswordToggle() {
            const password = document.getElementById('password');
            const toggle = document.getElementById('password-toggle');
            
            toggle.addEventListener('click', function() {
                if (password.type === 'password') {
                    password.type = 'text';
                    toggle.innerHTML = `
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-5.38 0-9.88-3.75-11.06-8.78L12 2l-1.94 1.22A10.07 10.07 0 0 0 12 20c5.38 0 9.88-3.75 11.06-8.78L12 2l1.94 1.22z"/>
                            <line x1="12" y1="2" x2="12" y2="6"/>
                        </svg>
                    `;
                } else {
                    password.type = 'password';
                    toggle.innerHTML = `
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8v11c0 2.21-1.79 4-4 4H5c-2.21 0-4-1.79-4-4V5z"/>
                            <path d="M12 1v6m0 4v6"/>
                        </svg>
                    `;
                }
            });
        }
        
        // Показ ошибок в полях
        function showFieldErrors(error) {
            // Очищаем предыдущие ошибки
            document.querySelectorAll('.form-error').forEach(el => el.textContent = '');
            
            // Показываем конкретные ошибки
            if (error.includes('имя пользователя') || error.includes('пароль')) {
                const usernameError = document.getElementById('username-error');
                const passwordError = document.getElementById('password-error');
                
                if (error.includes('имя пользователя')) {
                    usernameError.textContent = 'Неверное имя пользователя или email';
                } else {
                    passwordError.textContent = 'Неверный пароль';
                }
            }
        }
        
        // Показ уведомлений
        function showNotification(type, message) {
            const notification = document.getElementById('notification');
            const icon = document.getElementById('notification-icon');
            const messageEl = document.getElementById('notification-message');
            
            // Устанавливаем иконку
            if (type === 'success') {
                icon.innerHTML = '✓';
                notification.className = 'notification success';
            } else if (type === 'info') {
                icon.innerHTML = 'ℹ';
                notification.className = 'notification info';
            } else {
                icon.innerHTML = '✕';
                notification.className = 'notification error';
            }
            
            messageEl.textContent = message;
            notification.style.display = 'flex';
            
            // Автоматически скрываем через 5 секунд
            setTimeout(() => {
                notification.style.display = 'none';
            }, 5000);
        }
        
        // Закрытие уведомлений
        document.getElementById('notification-close').addEventListener('click', function() {
            document.getElementById('notification').style.display = 'none';
        });
    </script>
</body>
</html>
