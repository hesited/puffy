<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>Вход — Наше местечко</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Вход в систему</h1>

<form id="login-form" onsubmit="return false;">
    <div class="form-group">
        <label for="username">Логин:</label>
        <input type="text" id="username" placeholder="Введите логин" required>
    </div>
    <div class="form-group">
        <label for="password">Пароль:</label>
        <input type="password" id="password" placeholder="Введите пароль" required>
    </div>
    <button type="submit" class="btn-primary" onclick="login()">Войти</button>
</form>

<p id="error" class="error-message"></p>

</div>

<script src="auth.js"></script>
<script>
// Очищаем возможную старую сессию при загрузке страницы входа
localStorage.removeItem("auth");
localStorage.removeItem("currentUser");

if (localStorage.getItem("auth") === "true") {
    window.location.href = "index.html";
}

// Обработчик формы для Enter
document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    login();
});
</script>

</body>
</html>
