<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Список дел — Наше местечко</title>
	<link rel="stylesheet" href="../style.css">
	<link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap" rel="stylesheet">
</head>
<body>
	<div class="background">
		<div class="blob blob1"></div>
		<div class="blob blob2"></div>
		<div class="blob blob3"></div>
	</div>
	<nav class="top-menu" aria-label="Главное меню">
		<a href="../index.html">Главная</a>
		<a href="diary.html">Дневник</a>
		<a href="wishlist.html">Вишлист</a>
		<a href="recipes.html">Рецепты</a>
		<a href="todolist.html">Список дел</a>
		<a href="mediateka.html">Медиатека</a>
		<a href="#" onclick="logout()" class="logout-btn">Выход</a>
	</nav>
	<main class="container">
		<header class="hero">
			<h1 class="logo">PUFFY</h1>
			<p class="tagline">Список дел</p>
			<p class="date" id="current-date"></p>
		</header>
		<section class="content">
		<!-- Контент будет генерироваться JavaScript -->
	</section>
	</main>
	<nav class="bottom-nav" aria-label="Навигация">
		<a href="diary.html" title="Дневник">📔 Дневник</a>
		<a href="wishlist.html" title="Вишлист">⭐ Вишлист</a>
		<a href="recipes.html" title="Рецепты">🍳 Рецепты</a>
		<a href="todolist.html" title="Список дел">✅ Дела</a>
		<a href="mediateka.html" title="Медиатека">🎬 Медиатека</a>
	</nav>
	<script src="../auth.js"></script>
	<script src="../todolist.js"></script>
	<script>
		// Проверка аутентификации
		if (localStorage.getItem("auth") !== "true") { 
			window.location.href = "../login.html"; 
		}
		
		// Инициализация после загрузки всех скриптов
		window.addEventListener('load', function() {
			console.log('Window loaded, initializing todo list...');
			
			// Установка даты
			var d = new Date();
			var dateElement = document.getElementById('current-date');
			if (dateElement) {
				dateElement.textContent = d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
			}
			
			// Инициализация списка дел
			setTimeout(function() {
				if (typeof initializeTodoList === 'function') {
					console.log('Calling initializeTodoList...');
					initializeTodoList();
				} else {
					console.error('initializeTodoList function not found');
				}
			}, 100);
		});
	</script>
</body>
</html>
