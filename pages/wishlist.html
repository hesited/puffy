<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Вишлист — Наше местечко</title>
	<link rel="stylesheet" href="../style.css">
	<link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap" rel="stylesheet">
</head>
<body>
	<div class="background">
		<div class="blob blob1"></div>
		<div class="blob blob2"></div>
		<div class="blob blob3"></div>
	</div>
	<!-- Логотип PUFFY над навигацией -->
	<div class="top-logo">
		<div class="logo-small">PUFFY</div>
	</div>
	
	<nav class="top-menu" aria-label="Главное меню">
		<a href="../index.html" class="home-btn">🏠 Главная</a>
		<a href="diary.html">Дневник</a>
		<a href="wishlist.html">Вишлист</a>
		<a href="recipes.html">Рецепты</a>
		<a href="todolist.html">Список дел</a>
		<a href="mediateka.html">Медиатека</a>
		<a href="#" onclick="logout()" class="logout-btn">Выход</a>
	</nav>
	<main class="container">
		<header class="hero">
			<p class="date" id="current-date"></p>
			<div class="mobile-header">
				<h1 class="page-title">Вишлист</h1>
				<div class="mobile-add-btn">
					<a href="wishlist.html?add=1" class="btn-primary mobile-btn">+ Добавить желание</a>
				</div>
			</div>
		</header>
		<section class="content">
		<!-- Контент будет генерироваться JavaScript -->
	</section>
	</main>
	<nav class="bottom-nav" aria-label="Навигация по разделам">
		<a href="../index.html" title="Главная" class="nav-item">
			<span class="nav-icon">🏠</span>
			<span class="nav-label">Главная</span>
		</a>
		<a href="diary.html" title="Дневник" class="nav-item">
			<span class="nav-icon">📔</span>
			<span class="nav-label">Дневник</span>
		</a>
		<a href="wishlist.html" title="Вишлист" class="nav-item">
			<span class="nav-icon">⭐</span>
			<span class="nav-label">Вишлист</span>
		</a>
		<a href="recipes.html" title="Рецепты" class="nav-item">
			<span class="nav-icon">🍳</span>
			<span class="nav-label">Рецепты</span>
		</a>
		<a href="todolist.html" title="Список дел" class="nav-item">
			<span class="nav-icon">✅</span>
			<span class="nav-label">Дела</span>
		</a>
		<a href="mediateka.html" title="Медиатека" class="nav-item">
			<span class="nav-icon">🎬</span>
			<span class="nav-label">Медиатека</span>
		</a>
	</nav>
	<script src="../auth.js"></script>
<script src="../wishlist.js"></script>
<script>
	// Проверка аутентификации
	if (localStorage.getItem("auth") !== "true") { 
		window.location.href = "../login.html"; 
	}
	
	// Инициализация после загрузки всех скриптов
	window.addEventListener('load', function() {
		console.log('Window loaded, initializing wishlist...');
		
		// Установка даты
		var d = new Date();
		var dateElement = document.getElementById('current-date');
		if (dateElement) {
			dateElement.textContent = d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
		}
		
		// Инициализация вишлиста
		setTimeout(function() {
			if (typeof initializeWishlist === 'function') {
				console.log('Calling initializeWishlist...');
				initializeWishlist();
			} else {
				console.error('initializeWishlist function not found');
			}
		}, 100);
	});
</script>
</body>
</html>
