<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Дневник — Наше местечко</title>
	<link rel="stylesheet" href="../style.css">
	<link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap" rel="stylesheet">
</head>
<body>
	<div class="background">
		<div class="blob blob1"></div>
		<div class="blob blob2"></div>
		<div class="blob blob3"></div>
	</div>
	<!-- Логотип PUFFY над навигацией -->
	<div class="top-logo">
		<div class="logo-small">PUFFY</div>
	</div>
	
	<nav class="top-menu" aria-label="Главное меню">
		<a href="../index.html" class="home-btn">🏠 Главная</a>
		<a href="diary.html">Дневник</a>
		<a href="wishlist.html">Вишлист</a>
		<a href="recipes.html">Рецепты</a>
		<a href="todolist.html">Список дел</a>
		<a href="mediateka.html">Медиатека</a>
		<a href="#" onclick="logout()" class="logout-btn">Выход</a>
	</nav>
	<main class="container">
		<header class="hero">
			<p class="date" id="current-date"></p>
			<div class="mobile-header">
				<h1 class="page-title">Дневник</h1>
				<div class="mobile-add-btn">
					<a href="diary.html?add=1" class="btn-primary mobile-btn">+ Добавить запись</a>
				</div>
			</div>
		</header>
		
		<!-- Поиск и фильтры -->
		<div class="search-container">
			<div class="search-input-wrapper">
				<input type="text" class="search-input" id="search-input" placeholder="Поиск по записям...">
				<button type="button" class="search-clear" id="search-clear" aria-label="Очистить поиск">×</button>
			</div>
		</div>
		
		<div class="filters-container">
			<button class="filter-chip" data-filter="all">Все записи</button>
			<button class="filter-chip" data-filter="recent">Последние</button>
			<button class="filter-chip" data-filter="favorites">Избранные</button>
		</div>
		
		<div class="search-results" id="search-results" style="display: none;"></div>
		
		<section class="content">
		<!-- Контент будет генерироваться JavaScript -->
	</section>
	</main>
	<nav class="bottom-nav" aria-label="Навигация по разделам">
		<a href="../index.html" title="Главная" class="nav-item">
			<span class="nav-icon">🏠</span>
			<span class="nav-label">Главная</span>
		</a>
		<a href="diary.html" title="Дневник" class="nav-item">
			<span class="nav-icon">📔</span>
			<span class="nav-label">Дневник</span>
		</a>
		<a href="wishlist.html" title="Вишлист" class="nav-item">
			<span class="nav-icon">⭐</span>
			<span class="nav-label">Вишлист</span>
		</a>
		<a href="recipes.html" title="Рецепты" class="nav-item">
			<span class="nav-icon">🍳</span>
			<span class="nav-label">Рецепты</span>
		</a>
		<a href="todolist.html" title="Список дел" class="nav-item">
			<span class="nav-icon">✅</span>
			<span class="nav-label">Дела</span>
		</a>
		<a href="mediateka.html" title="Медиатека" class="nav-item">
			<span class="nav-icon">🎬</span>
			<span class="nav-label">Медиатека</span>
		</a>
	</nav>
	<script src="../auth.js"></script>
	<script src="../geolocation.js"></script>
	<script src="../search.js"></script>
	<script src="../notes.js"></script>
	<script>
		// Проверка аутентификации
		if (localStorage.getItem("auth") !== "true") { 
			window.location.href = "../login.html"; 
		}
		
		// Инициализация после загрузки всех скриптов
		window.addEventListener('load', function() {
			console.log('Window loaded, initializing diary...');
			
			// Установка даты
			var d = new Date();
			var dateElement = document.getElementById('current-date');
			if (dateElement) {
				dateElement.textContent = d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
			}
			
			// Инициализация дневника
			setTimeout(function() {
				if (typeof initializeDiary === 'function') {
					console.log('Calling initializeDiary...');
					initializeDiary();
				} else {
					console.error('initializeDiary function not found');
				}
			}, 100);
			
			// Активация текущего раздела в мобильном меню
			function setActiveNavItem() {
				const currentPath = window.location.pathname;
				const navItems = document.querySelectorAll('.nav-item');
				
				navItems.forEach(item => {
					item.classList.remove('active');
					const href = item.getAttribute('href');
					
					// Проверяем совпадение пути
					if (currentPath.includes(href) || 
						(currentPath.includes('diary.html') && href === 'diary.html')) {
						item.classList.add('active');
					}
				});
			}
			
			// Инициализация активного пункта меню
			setActiveNavItem();
		});
	</script>
</body>
</html>
