<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — PUFFY</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>
    
    <main class="container">
        <div class="auth-container fade-in-up">
            <header class="auth-header">
                <h1 class="logo" aria-label="PUFFY">
                    <span class="logo-letter">P</span>
                    <span class="logo-letter">U</span>
                    <span class="logo-letter">F</span>
                    <span class="logo-letter">F</span>
                    <span class="logo-letter">Y</span>
                </h1>
                <p class="tagline">Создайте ваше личное пространство</p>
            </header>
            
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" name="username" required 
                           placeholder="Введите имя пользователя" 
                           autocomplete="username">
                    <div class="form-error" id="username-error"></div>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required 
                           placeholder="Введите ваш email" 
                           autocomplete="email">
                    <div class="form-error" id="email-error"></div>
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" required 
                               placeholder="Введите пароль" 
                               autocomplete="new-password">
                        <button type="button" class="password-toggle" id="password-toggle">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8v11c0 2.21-1.79 4-4 4H5c-2.21 0-4-1.79-4-4V5z"/>
                                <path d="M12 1v6m0 4v6"/>
                            </svg>
                        </button>
                    </div>
                    <div class="form-error" id="password-error"></div>
                    <div class="password-requirements" id="password-requirements">
                        <div class="requirement" id="req-length">
                            <span class="requirement-icon">○</span>
                            Минимум 6 символов
                        </div>
                        <div class="requirement" id="req-uppercase">
                            <span class="requirement-icon">○</span>
                            Одна заглавная буква
                        </div>
                        <div class="requirement" id="req-lowercase">
                            <span class="requirement-icon">○</span>
                            Одна строчная буква
                        </div>
                        <div class="requirement" id="req-number">
                            <span class="requirement-icon">○</span>
                            Одна цифра
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">Подтвердите пароль</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="confirm-password" name="confirm-password" required 
                               placeholder="Введите пароль еще раз" 
                               autocomplete="new-password">
                        <button type="button" class="password-toggle" id="confirm-password-toggle">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8v11c0 2.21-1.79 4-4 4H5c-2.21 0-4-1.79-4-4V5z"/>
                                <path d="M12 1v6m0 4v6"/>
                            </svg>
                        </button>
                    </div>
                    <div class="form-error" id="confirm-password-error"></div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="register-btn">
                        <span class="btn-text">Зарегистрироваться</span>
                        <div class="loading-spinner" id="register-loading" style="display: none;"></div>
                    </button>
                </div>
                
                <div class="auth-links">
                    <p>Уже есть аккаунт? <a href="login.html" class="auth-link">Войдите</a></p>
                </div>
            </form>
        </div>
    </main>
    
    <div class="notification" id="notification" style="display: none;">
        <div class="notification-content">
            <div class="notification-icon" id="notification-icon"></div>
            <div class="notification-message" id="notification-message"></div>
            <button class="notification-close" id="notification-close">×</button>
        </div>
    </div>

    <script src="auth-system.js"></script>
    <script>
        // Инициализация системы авторизации
        const authSystem = new AuthSystem();
        
        // Проверяем, не авторизован ли уже пользователь
        if (authSystem.isAuthenticated()) {
            window.location.href = 'index.html';
        }
        
        // Обработчики формы
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('register-form');
            const registerBtn = document.getElementById('register-btn');
            const loadingSpinner = document.getElementById('register-loading');
            
            // Переключатели видимости пароля
            setupPasswordToggle('password', 'password-toggle');
            setupPasswordToggle('confirm-password', 'confirm-password-toggle');
            
            // Валидация пароля в реальном времени
            setupPasswordValidation();
            
            // Отправка формы
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // Показываем загрузку
                registerBtn.disabled = true;
                loadingSpinner.style.display = 'inline-block';
                document.querySelector('.btn-text').style.display = 'none';
                
                // Собираем данные формы
                const formData = {
                    username: document.getElementById('username').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    password: document.getElementById('password').value,
                    confirmPassword: document.getElementById('confirm-password').value
                };
                
                // Пытаемся зарегистрировать
                const result = await authSystem.register(formData);
                
                if (result.success) {
                    showNotification('success', result.message);
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showNotification('error', result.error);
                    // Показываем конкретные ошибки полей
                    showFieldErrors(result.error);
                }
                
                // Скрываем загрузку
                registerBtn.disabled = false;
                loadingSpinner.style.display = 'none';
                document.querySelector('.btn-text').style.display = 'inline';
            });
        });
        
        // Настройка переключателей пароля
        function setupPasswordToggle(inputId, buttonId) {
            const input = document.getElementById(inputId);
            const button = document.getElementById(buttonId);
            
            button.addEventListener('click', function() {
                if (input.type === 'password') {
                    input.type = 'text';
                    button.innerHTML = `
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-5.38 0-9.88-3.75-11.06-8.78L12 2l-1.94 1.22A10.07 10.07 0 0 0 12 20c5.38 0 9.88-3.75 11.06-8.78L12 2l1.94 1.22z"/>
                            <line x1="12" y1="2" x2="12" y2="6"/>
                        </svg>
                    `;
                } else {
                    input.type = 'password';
                    button.innerHTML = `
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8v11c0 2.21-1.79 4-4 4H5c-2.21 0-4-1.79-4-4V5z"/>
                            <path d="M12 1v6m0 4v6"/>
                        </svg>
                    `;
                }
            });
        }
        
        // Валидация пароля в реальном времени
        function setupPasswordValidation() {
            const password = document.getElementById('password');
            const requirements = {
                length: document.getElementById('req-length'),
                uppercase: document.getElementById('req-uppercase'),
                lowercase: document.getElementById('req-lowercase'),
                number: document.getElementById('req-number')
            };
            
            password.addEventListener('input', function() {
                const value = password.value;
                
                // Проверяем требования
                const checks = {
                    length: value.length >= 6,
                    uppercase: /[A-Z]/.test(value),
                    lowercase: /[a-z]/.test(value),
                    number: /\d/.test(value)
                };
                
                // Обновляем индикаторы
                Object.keys(checks).forEach(key => {
                    const icon = requirements[key].querySelector('.requirement-icon');
                    if (checks[key]) {
                        icon.textContent = '✓';
                        requirements[key].classList.add('valid');
                    } else {
                        icon.textContent = '○';
                        requirements[key].classList.remove('valid');
                    }
                });
            });
        }
        
        // Показ ошибок в полях
        function showFieldErrors(error) {
            // Очищаем предыдущие ошибки
            document.querySelectorAll('.form-error').forEach(el => el.textContent = '');
            
            // Показываем конкретные ошибки
            if (error.includes('имя пользователя')) {
                document.getElementById('username-error').textContent = error;
            }
            if (error.includes('email')) {
                document.getElementById('email-error').textContent = error;
            }
            if (error.includes('пароль')) {
                document.getElementById('password-error').textContent = error;
            }
            if (error.includes('совпадают')) {
                document.getElementById('confirm-password-error').textContent = error;
            }
        }
        
        // Показ уведомлений
        function showNotification(type, message) {
            const notification = document.getElementById('notification');
            const icon = document.getElementById('notification-icon');
            const messageEl = document.getElementById('notification-message');
            
            // Устанавливаем иконку
            if (type === 'success') {
                icon.innerHTML = '✓';
                notification.className = 'notification success';
            } else {
                icon.innerHTML = '✕';
                notification.className = 'notification error';
            }
            
            messageEl.textContent = message;
            notification.style.display = 'flex';
            
            // Автоматически скрываем через 5 секунд
            setTimeout(() => {
                notification.style.display = 'none';
            }, 5000);
        }
        
        // Закрытие уведомлений
        document.getElementById('notification-close').addEventListener('click', function() {
            document.getElementById('notification').style.display = 'none';
        });
    </script>
</body>
</html>
